name: Update Fishing Conditions

on:
  push:
    paths:
      - 'data/fishing_data.csv'   # V5.5「GitHubに保存」で fishing_data.csv が更新されたら即時実行
    branches:
      - main
  schedule:
    - cron: '0 0 * * 1'   # 毎週月曜 UTC 0:00 (JST 9:00)
  workflow_dispatch:        # 手動実行も可能

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # CSVとJSONのコミット・プッシュに必要

    steps:
      # ① リポジトリをチェックアウト
      - name: Checkout repository
        uses: actions/checkout@v4

      # ② Node.js 20 をセットアップ（fetch 組み込み）
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ③ 環境データを差分取得して fishing_condition_db.csv に追記
      - name: Update condition data
        run: node scripts/update-conditions.js

      # ④ 釣果 × 環境データを結合して fishing_integrated.csv を生成
      - name: Merge fishing + condition data
        run: node scripts/merge-data.js

      # ⑤ 変更があれば commit & push
      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/fishing_condition_db.csv data/fishing_condition_db.json data/fishing_integrated.csv
          git diff --staged --quiet || git commit -m "Auto-update condition data $(date +%Y-%m-%d)"
          git push
