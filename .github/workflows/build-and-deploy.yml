name: 室戸沖釣果DB自動更新 / Build Muroto Fishing Database

# ─── トリガー ───────────────────────────────────────
# W6-1（2026-04-19）：V5.5 の書込先を master_catch.csv に切り替えたことにより、
# 旧 push トリガー（fishing_data.csv 等）は一時無効化する。
# W6-2 で master_catch.csv をトリガーにした新設計のパイプラインに再構築する予定。
on:
  # 手動実行のみ（W6-2 完成まで自動実行は停止）
  workflow_dispatch:

  # --- 以下は W6-2 完成まで無効化 ---
  # push:
  #   paths:
  #     - 'data/fishing_data.csv'
  #     - 'data/fishing_condition_db.csv'
  #     - 'data/muroto_offshore_current_all.csv'
  #   branches:
  #     - main
  #
  # schedule:
  #   - cron: '0 1 * * 1'

# ─── ジョブ ─────────────────────────────────────────
jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # CSV/JS のコミット・プッシュに必要

    steps:
      # ① リポジトリをチェックアウト
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      # ② Python セットアップ
      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ③ データ結合 + JSファイル生成
      - name: データベースをビルド
        run: python scripts/build_database.py

      # ④ 変更があればコミット＆プッシュ
      - name: コミット＆プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/fishing_muroto_v1.csv
          git add data/js/fishing_muroto_v1_data.js

          if git diff --staged --quiet; then
            echo "変更なし。コミットをスキップします。"
          else
            git commit -m "データ自動更新: $(date +%Y-%m-%d) [skip ci]"
            git push
            echo "✅ コミット＆プッシュ完了"
          fi
