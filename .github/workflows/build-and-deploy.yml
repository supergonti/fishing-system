name: 室戸沖釣果DB自動更新 / Build Muroto Fishing Database

# ─── トリガー ───────────────────────────────────────
on:
  # data/ フォルダ内のCSVが更新されたとき自動実行
  push:
    paths:
      - 'data/fishing_data.csv'
      - 'data/fishing_condition_db.csv'
      - 'data/muroto_offshore_current_all.csv'
    branches:
      - main

  # 手動実行
  workflow_dispatch:

  # 毎週月曜 UTC 1:00 (JST 10:00) に定期実行
  # ※ 上流の2リポジトリが更新された後のタイミング
  schedule:
    - cron: '0 1 * * 1'

# ─── ジョブ ─────────────────────────────────────────
jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # CSV/JS のコミット・プッシュに必要

    steps:
      # ① リポジトリをチェックアウト
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      # ② Python セットアップ
      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ③ データ結合 + JSファイル生成
      - name: データベースをビルド
        run: python scripts/build_database.py

      # ④ 変更があればコミット＆プッシュ
      - name: コミット＆プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/fishing_muroto_v1.csv
          git add data/js/fishing_muroto_v1_data.js

          if git diff --staged --quiet; then
            echo "変更なし。コミットをスキップします。"
          else
            git commit -m "データ自動更新: $(date +%Y-%m-%d) [skip ci]"
            git push
            echo "✅ コミット＆プッシュ完了"
          fi
